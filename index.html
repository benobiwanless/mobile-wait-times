<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Theme Park Wait Times</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --text-color: #ffffff;
            --border-radius: 12px;
            --green: #00ff88;
            --yellow: #ffcc00;
            --red: #ff4444;
            --primary: #3aa6ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 16px;
            line-height: 1.5;
            padding-top: 90px; /* Space for the top bar fixed dropdown */
        }

        /* Fixed Top Dropdown Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #1a1a1a;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            z-index: 1000;
            border-bottom: 2px solid #333;
            padding: 14px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .select-container {
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        select {
            width: 100%;
            padding: 12px 40px 12px 16px;
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-color);
            background-color: #2a2a2a;
            border: 2px solid #444;
            border-radius: 8px;
            cursor: pointer;
            appearance: none; 
            -webkit-appearance: none;
            text-transform: uppercase;
            transition: border-color 0.2s ease;
        }

        select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .select-container::after {
            content: "▼";
            font-size: 0.8rem;
            color: #888;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* Park Container Card */
        .park-container {
            background: var(--card-bg);
            border: 2px solid #333;
            border-radius: var(--border-radius);
            padding: 20px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            display: flex;
            flex-direction: column;
        }

        /* Live Overview Dashboard Panel */
        .park-stats-dashboard {
            display: flex;
            justify-content: space-around;
            background: #1c1c1c;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 20px;
            text-align: center;
        }

        .stat-box {
            flex: 1;
        }

        .stat-box .stat-label {
            font-size: 0.75rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .stat-box .stat-value {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
        }

        .stat-box .stat-value.avg-wait-highlight {
            color: var(--primary);
        }

        /* Ride Lists */
        .ride-list {
            display: flex;
            flex-direction: column;
        }

        .ride-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #222;
            font-size: 1.05rem;
            font-weight: 700;
        }

        .ride-row:last-child {
            border-bottom: none;
        }

        .ride-name {
            padding-right: 15px;
        }

        .wait-time {
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        /* Status Dot Foundations */
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 12px;
            display: inline-block;
            position: relative;
        }

        .dot-green { background-color: var(--green); color: var(--green); }
        .dot-yellow { background-color: var(--yellow); color: var(--yellow); }
        .dot-red { background-color: var(--red); color: var(--red); }
        .dot-gray { background-color: #555555; color: #555555; }
        
        /* Interactive Pulsing Keyframe Layer - Only triggers over 45m */
        .pulse-red {
            animation: pulse-danger 0.9s infinite ease-in-out;
            box-shadow: 0 0 14px var(--red);
        }
