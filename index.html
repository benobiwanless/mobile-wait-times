<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Theme Park Wait Times</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #111111;
            --text-color: #ffffff;
            --border-radius: 16px;
            --green: #00ff88;
            --yellow: #ffcc00;
            --red: #ff4444;
            --primary: #3aa6ff;
            --glow-color: rgba(58, 166, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 16px;
            line-height: 1.5;
            padding-top: 90px; /* Space for fixed dropdown header */
        }

        /* --- FIXED DROPDOWN HEADER AREA --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #121212;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            z-index: 1000;
            border-bottom: 1px solid #222;
            padding: 14px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .select-container {
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        select {
            width: 100%;
            padding: 12px 40px 12px 16px;
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-color);
            background-color: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            cursor: pointer;
            appearance: none; 
            -webkit-appearance: none;
            text-transform: uppercase;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(58, 166, 255, 0.3);
        }

        .select-container::after {
            content: "▼";
            font-size: 0.8rem;
            color: #666;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* --- PARK CONTAINER CARD --- */
        .park-container {
            background: var(--card-bg);
            border: 2px solid #222;
            border-radius: var(--border-radius);
            padding: 24px;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 25px var(--glow-color);
        }

        .park-title-header {
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 4px;
        }

        .park-divider {
            height: 1px;
            background: #2a2a2a;
            margin-bottom: 16px;
            width: 100%;
        }

        .sync-timestamp-bar {
            text-align: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .park-stats-dashboard {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #161616;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 20px;
            text-align: center;
            gap: 16px;
        }

        .stat-box {
            flex: 1;
        }

        .stat-box .stat-label {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .stat-box .stat-value {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            white-space: nowrap;
        }

        .stat-box .stat-value.avg-wait-highlight {
            color: var(--primary);
        }

        @media (max-width: 480px) {
            body {
                padding-top: 85px;
            }
            .park-stats-dashboard {
                flex-direction: column;
                gap: 12px;
            }
            .stat-box:first-child {
                border-bottom: 1px solid #222;
                padding-bottom: 10px;
                width: 100%;
            }
            .stat-box .stat-value {
                font-size: 1.2rem;
            }
        }

        /* --- RIDE ROWS AND BADGES --- */
        .ride-list {
            display: flex;
            flex-direction: column;
        }

        .ride-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 1.05rem;
            font-weight: 700;
        }

        .ride-row:last-child {
            border-bottom: none;
        }

        .ride-meta-container {
            display: flex;
            flex-direction: column;
            padding-right: 15px;
        }

        .ride-name {
            color: #ddd;
        }

        .park-badge {
            font-size: 0.65rem;
            font-weight: 800;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-top: 2px;
        }

        .wait-time {
            display: flex;
            align-items: center;
            white-space: nowrap;
            font-weight: 800;
        }

        .green { color: var(--green); }
        .yellow { color: var(--yellow); }
        .red { color: var(--red); }
        .gray { color: #666; }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 12px;
            display: inline-block;
        }

        .dot-green { background-color: var(--green); }
        .dot-yellow { background-color: var(--yellow); }
        .dot-red { background-color: var(--red); }
        .dot-gray { background-color: #444; }
        
        .pulse-red {
            animation: pulse-danger 0.9s infinite ease-in-out;
            box-shadow: 0 0 12px var(--red);
        }

        @keyframes pulse-danger {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
            font-weight: bold;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="select-container">
            <select id="parkSelect" onchange="switchPark(this.value)">
                <optgroup label="Disney">
                    <option value="mk">Magic Kingdom</option>
                    <option value="epcot">EPCOT</option>
                    <option value="hs">Hollywood Studios</option>
                    <option value="ak">Animal Kingdom</option>
                </optgroup>
                <optgroup label="Universal">
                    <option value="usf">Universal Studios Florida</option>
                    <option value="ioa">Islands of Adventure</option>
                    <option value="epic">Epic Universe</option>
                </optgroup>
                <optgroup label="Aggregated Monitors">
                    <option value="all">All Parks (Orlando)</option>
                </optgroup>
            </select>
        </div>
    </header>

    <div class="park-container">
        <div id="dynamicParkTitle" class="park-title-header">Magic Kingdom</div>
        <div class="park-divider"></div>

        <div id
