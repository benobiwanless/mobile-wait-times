<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Theme Park Wait Times</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #111111;
            --text-color: #ffffff;
            --border-radius: 16px;
            --green: #00ff88;
            --yellow: #ffcc00;
            --red: #ff4444;
            --primary: #3aa6ff;
            --glow-color: rgba(58, 166, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 24px 16px;
            line-height: 1.5;
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto 24px auto;
            background: #0a0a0a;
            border-bottom: 1px solid #222;
            padding: 8px 16px;
        }

        .nav-row {
            display: flex;
            align-items: center;
            padding: 6px 0;
            gap: 12px;
            overflow-x: auto;
            white-space: nowrap;
        }

        .nav-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: #555;
            text-transform: uppercase;
            width: 90px;
            flex-shrink: 0;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            color: #fff;
        }

        .nav-btn.active {
            color: var(--primary);
            background: rgba(58, 166, 255, 0.1);
            box-shadow: inset 0 -2px 0 var(--primary);
            border-radius: 4px 4px 0 0;
        }

        .park-container {
            background: var(--card-bg);
            border: 2px solid #222;
            border-radius: var(--border-radius);
            padding: 24px;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 25px var(--glow-color);
        }

        .park-title-header {
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 4px;
        }

        .park-divider {
            height: 1px;
            background: #2a2a2a;
            margin-bottom: 16px;
            width: 100%;
        }

        .sync-timestamp-bar {
            text-align: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .park-stats-dashboard {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #161616;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 20px;
            text-align: center;
            gap: 16px;
        }

        .stat-box {
            flex: 1;
        }

        .stat-box .stat-label {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .stat-box .stat-value {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            white-space: nowrap;
        }

        .stat-box .stat-value.avg-wait-highlight {
            color: var(--primary);
        }

        @media (max-width: 480px) {
            .park-stats-dashboard {
                flex-direction: column;
                gap: 12px;
            }
            .stat-box:first-child {
                border-bottom: 1px solid #222;
                padding-bottom: 10px;
                width: 100%;
            }
            .stat-box .stat-value {
                font-size: 1.2rem;
            }
        }

        .ride-list {
            display: flex;
            flex-direction: column;
        }

        .ride-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 1.05rem;
            font-weight: 700;
        }

        .ride-row:last-child {
            border-bottom: none;
        }

        .ride-name {
            padding-right: 15px;
            color: #ddd;
        }

        .wait-time {
            display: flex;
            align-items: center;
            white-space: nowrap;
            font-weight: 800;
        }

        .green { color: var(--green); }
        .yellow { color: var(--yellow); }
        .red { color: var(--red); }
        .gray { color: #666; }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 12px;
            display: inline-block;
        }

        .dot-green { background-color: var(--green); }
        .dot-yellow { background-color: var(--yellow); }
        .dot-red { background-color: var(--red); }
        .dot-gray { background-color: #444; }
        
        .pulse-red {
            animation: pulse-danger 0.9s infinite ease-in-out;
            box-shadow: 0 0 12px var(--red);
        }

        @keyframes pulse-danger {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
            font-weight: bold;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="nav-container">
        <div class="nav-row">
            <span class="nav-label">Disney</span>
            <button class="nav-btn active" onclick="switchPark('mk', this)">Magic Kingdom</button>
            <button class="nav-btn" onclick="switchPark('epcot', this)">EPCOT</button>
            <button class="nav-btn" onclick="switchPark('hs', this)">Hollywood</button>
            <button class="nav-btn" onclick="switchPark('ak', this)">Animal Kingdom</button>
        </div>
        <div class="nav-row">
            <span class="nav-label">Universal</span>
            <button class="nav-btn" onclick="switchPark('usf', this)">Studios</button>
            <button class="nav-btn" onclick="switchPark('ioa', this)">Islands</button>
            <button class="nav-btn" onclick="switchPark('epic', this)">Epic Universe</button>
        </div>
        <div class="nav-row">
            <span class="nav-label">Other</span>
            <button class="nav-btn" onclick="switchPark('seaworld', this)">SeaWorld</button>
            <button class="nav-btn" onclick="switchPark('aquatica', this)">Aquatica</button>
        </div>
    </div>

    <div class="park-container">
        <div id="dynamicParkTitle" class="park-title-header">Magic Kingdom</div>
        <div class="park-divider"></div>

        <div id="syncTimeStatus" class="sync-timestamp-bar">Connecting to stream...</div>

        <div class="park-stats-dashboard">
            <div class="stat-box">
                <div class="stat-label">Today's Hours</div>
                <div id="parkHoursValue" class="stat-value">Fetching...</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Avg. Wait Time</div>
                <div id="parkAvgWaitValue" class="stat-value avg-wait-highlight">--</div>
            </div>
        </div>

        <div id="rideDisplayList" class="ride-list">
            <div class="loading">Loading live times...</div>
        </div>
    </div>

    <script>
        const API_BASE = "https://api.themeparks.wiki/v1";

        const parkIds = {
            'mk': '75ea578a-adc8-4116-a54d-dccb60765ef9',    
            'epcot': '47f90d2c-e191-4239-a466-5892ef59a88b', 
            'hs': '288747d1-8b4f-4a64-867e-ea7c9b27bad8',    
            'ak': '1c84a229-8862-4648-9c71-378ddd2c7693',     
            'usf': 'eb3f4560-2383-4a36-9152-6b3e5ed6bc57',   
            'ioa': '267615cc-8943-4c2a-ae2c-5da728ca591f',   
            'epic': '12dbb85b-265f-44e6-bccf-f1faa17211fc',
            'seaworld': '27d64dee-d85e-48dc-ad6d-8077445cd946',
            'aquatica': '9e2867f8-68eb-454f-b367-0ed0fd72d72a'
        };

        let activeParkKey = 'mk';
        let globalRideCache = {};
        let globalHoursCache = {};
        let lastFetchTimestamp = null;

        function switchPark(parkKey, element) {
            activeParkKey = parkKey;
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if (element) element.classList.add('active');

            if (element) {
                document.getElementById('dynamicParkTitle').innerText = element.innerText;
            }

            updateDashboardDisplay(parkKey);
            
            if (globalRideCache[parkKey]) {
                displayRides(globalRideCache[parkKey]);
            } else {
                document.getElementById('rideDisplayList').innerHTML = '<div class="loading">Loading live times...</div>';
                fetchWaitTimes();
            }
        }

        function formatTimeString(isoString) {
            if (!isoString) return '';
            try {
                const date = new Date(isoString);
                return date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            } catch (e) {
                return '';
            }
        }

        function updateDashboardDisplay(parkKey) {
            const hoursEl = document.getElementById('parkHoursValue');
            const avgWaitEl = document.getElementById('parkAvgWaitValue');

            if (globalHoursCache[parkKey]) {
                hoursEl.innerText = globalHoursCache[parkKey];
            } else {
                hoursEl.innerText = "Fetching...";
                fetchParkHours(parkKey);
            }

            const rides = globalRideCache[parkKey];
            if (rides && rides.length > 0) {
                let operatingRides = rides.filter(r => r.status === "OPERATING" && r.queue?.STANDBY?.waitTime !== undefined);
                if (operatingRides.length > 0) {
                    let totalWait = operatingRides.reduce((sum, r) => sum + r.queue.STANDBY.waitTime, 0);
                    let avg = Math.round(totalWait / operatingRides.length);
                    avgWaitEl.innerText = `${avg} min`;
                } else {
                    avgWaitEl.innerText = "Closed";
                }
            } else {
                avgWaitEl.innerText = "--";
            }
        }

        function runLiveClockTracker() {
            setInterval(() => {
                const statusEl = document.getElementById('syncTimeStatus');
                if (!lastFetchTimestamp) {
                    statusEl.innerText = "Waiting for initial sync...";
                    return;
                }
                const elapsedSeconds = Math.floor((Date.now() - lastFetchTimestamp) / 1000);
                if (elapsedSeconds < 5) {
                    statusEl.innerText = "Updated just now";
                } else {
                    statusEl.innerText = `Updated ${elapsedSeconds}s ago`;
                }
            }, 1000);
        }

        async function fetchParkHours(parkKey) {
            const wikiId = parkIds[parkKey];
            try {
                const response = await fetch(`${API_BASE}/entity/${wikiId}/schedule`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                if (data && data.schedule && data.schedule.length > 0) {
                    const localDate = new Date();
                    const yyyy = localDate.getFullYear();
                    const mm = String(localDate.getMonth() + 1).padStart(2, '0');
                    const dd = String(localDate.getDate()).padStart(2, '0');
                    const todayStr = `${yyyy}-${mm}-${dd}`;
                    
                    let operationalDays = data.schedule.filter(day => day.date === todayStr && day.type === "OPERATING");
                    if (operationalDays.length === 0) {
                        operationalDays = data.schedule.filter(day => day.type === "OPERATING");
                    }
                    
                    if (operationalDays.length > 0 && operationalDays[0].openingTime) {
                        const target = operationalDays[0];
                        let hoursText = `${formatTimeString(target.openingTime)} - ${formatTimeString(target.closingTime)}`;
                        globalHoursCache[parkKey] = hoursText;
                    } else {
                        globalHoursCache[parkKey] = "Closed / See App";
                    }
                } else {
                    globalHoursCache[parkKey] = "Closed";
                }
                
                if (parkKey === activeParkKey) {
                    document.getElementById('parkHoursValue').innerText = globalHoursCache[parkKey];
                }
            } catch (e) {
                if (parkKey === activeParkKey) document.getElementById('parkHoursValue').innerText = "Unavailable";
            }
        }

        async function fetchSingleParkTimes(localId, wikiId) {
            try {
                const response = await fetch(`${API_BASE}/entity/${wikiId}/live`);
                if (!response.ok) throw new Error('API server error');
                
                const data = await response.json();
                if (!data || !data.liveData) return;
                
                const rides = data.liveData.filter(item => item.entityType === "ATTRACTION");
                
                rides.sort((a, b) => {
                    const aOpen = a.status === "OPERATING";
                    const bOpen = b.status === "OPERATING";
                    
                    if (aOpen && !bOpen) return -1;
                    if (!aOpen && bOpen) return 1;
                    
                    if (aOpen && bOpen) {
                        const aWait = a.queue?.STANDBY?.waitTime ?? 0;
                        const bWait = b.queue?.STANDBY?.waitTime ?? 0;
                        if (bWait !== aWait) return bWait - aWait;
                    }
                    return a.name.localeCompare(b.name);
                });

                globalRideCache[localId] = rides;

                if (localId === activeParkKey) {
                    updateDashboardDisplay(localId);
                    displayRides(rides);
                }
            } catch (error) {
                console.error(`Error pulling times for ${localId}:`, error);
                if (localId === activeParkKey && !globalRideCache[localId]) {
                    document.getElementById('rideDisplayList').innerHTML = '<div class="loading">Connection offline or pulling active database updates...</div>';
                }
            }
        }

        async function fetchWaitTimes() {
            if (!globalHoursCache[activeParkKey]) {
                fetchParkHours(activeParkKey);
            }

            const fetchPromises = Object.entries(parkIds).map(([localId, wikiId]) => 
                fetchSingleParkTimes(localId, wikiId)
            );

            await Promise.allSettled(fetchPromises);
            lastFetchTimestamp = Date.now();
        }

        function displayRides(rides) {
            const listContainer = document.getElementById('rideDisplayList');
            listContainer.innerHTML = ''; 

            if (!rides || rides.length === 0) {
                listContainer.innerHTML = '<div class="loading">No active attraction times reported.</div>';
                return;
            }

            rides.forEach(ride => {
                const isOpen = ride.status === "OPERATING";
                const wait = ride.queue?.STANDBY?.waitTime ?? 0;
                
                let dotColor = 'dot-green';
                let pulseClass = '';
                let textColor = 'green';
                
                if (!isOpen) {
                    dotColor = 'dot-gray';
                    textColor = 'gray';
                } else if (wait >= 31) {
                    dotColor = 'dot-red';
                    textColor = 'red';
                    if (wait >= 45) {
                        pulseClass = 'pulse-red';
                    }
                } else if (wait >= 16) {
                    dotColor = 'dot-yellow';
                    textColor = 'yellow';
                }

                const displayWait = isOpen ? `${wait}m` : 'Closed';

                const row = document.createElement('div');
                row.className = 'ride-row';
                row.innerHTML = `
                    <span class="ride-name">${ride.name}</span>
                    <span class="wait-time ${textColor}">
                        <span class="status-dot ${dotColor} ${pulseClass}"></span>
                        ${displayWait}
                    </span>
                `;
                listContainer.appendChild(row);
            });
        }

        function scheduleNextMinuteSync() {
            const now = new Date();
            const delayUntilNextMinute = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
            
            setTimeout(() => {
                fetchWaitTimes();
                setInterval(fetchWaitTimes, 60000);
            }, delayUntilNextMinute);
        }

        fetchWaitTimes();
        scheduleNextMinuteSync();
        runLiveClockTracker();
    </script>
</body>
</html>
