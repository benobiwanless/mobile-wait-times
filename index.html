<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Theme Park Wait Times</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --text-color: #ffffff;
            --border-radius: 12px;
            --green: #00ff88;
            --yellow: #ffcc00;
            --red: #ff4444;
            --primary: #3aa6ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 16px;
            line-height: 1.5;
            padding-top: 90px; /* Space for the top bar fixed dropdown */
        }

        /* Fixed Top Dropdown Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #1a1a1a;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            z-index: 1000;
            border-bottom: 2px solid #333;
            padding: 14px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .select-container {
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        select {
            width: 100%;
            padding: 12px 40px 12px 16px;
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-color);
            background-color: #2a2a2a;
            border: 2px solid #444;
            border-radius: 8px;
            cursor: pointer;
            appearance: none; 
            -webkit-appearance: none;
            text-transform: uppercase;
            transition: border-color 0.2s ease;
        }

        select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .select-container::after {
            content: "▼";
            font-size: 0.8rem;
            color: #888;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* Park Container Card */
        .park-container {
            background: var(--card-bg);
            border: 2px solid #333;
            border-radius: var(--border-radius);
            padding: 20px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            display: flex;
            flex-direction: column;
        }

        /* Ride Lists */
        .ride-list {
            display: flex;
            flex-direction: column;
        }

        .ride-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #222;
            font-size: 1.05rem;
            font-weight: 700;
        }

        .ride-row:last-child {
            border-bottom: none;
        }

        .ride-name {
            padding-right: 15px;
        }

        .wait-time {
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        /* Status Dot Foundations */
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 12px;
            display: inline-block;
            position: relative;
        }

        .dot-green { background-color: var(--green); color: var(--green); }
        .dot-yellow { background-color: var(--yellow); color: var(--yellow); }
        .dot-red { background-color: var(--red); color: var(--red); }
        .dot-gray { background-color: #555555; color: #555555; }
        
        /* Interactive Pulsing Keyframe Layer - Only triggers over 45m */
        .pulse-red {
            animation: pulse-danger 0.9s infinite ease-in-out;
            box-shadow: 0 0 14px var(--red);
        }

        @keyframes pulse-danger {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; box-shadow: 0 0 20px var(--red); }
            100% { transform: scale(1); opacity: 1; }
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: #888;
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="select-container">
            <select id="parkSelect" onchange="switchPark(this.value)">
                <optgroup label="Disney">
                    <option value="mk">Magic Kingdom</option>
                    <option value="epcot">EPCOT</option>
                    <option value="hs">Hollywood Studios</option>
                    <option value="ak">Animal Kingdom</option>
                </optgroup>
                <optgroup label="Universal">
                    <option value="usf">Universal Studios Florida</option>
                    <option value="ioa">Islands of Adventure</option>
                    <option value="epic">Epic Universe</option>
                </optgroup>
                <optgroup label="Other">
                    <option value="seaworld">SeaWorld Orlando</option>
                    <option value="aquatica">Aquatica Orlando</option>
                </optgroup>
            </select>
        </div>
    </header>

    <div class="park-container">
        <div id="rideDisplayList" class="ride-list">
            <div class="loading">Loading live times...</div>
        </div>
    </div>

    <script>
        // Database mapping setup matching your specific IDs
        const parkIds = {
            'mk': '75ea578a-adc8-4116-a54d-dccb60765ef9',    
            'epcot': '47f90d2c-e191-4239-a466-5892ef59a88b', 
            'hs': '288747d1-8b4f-4a64-867e-ea7c9b27bad8',    
            'ak': '1c84a229-8862-4648-9c71-378ddd2c7693',     
            'usf': 'eb3f4560-2383-4a36-9152-6b3e5ed6bc57',   
            'ioa': '267615cc-8943-4c2a-ae2c-5da728ca591f',   
            'epic': '12dbb85b-265f-44e6-bccf-f1faa17211fc',
            'seaworld': '27d64dee-d85e-48dc-ad6d-8077445cd946',
            'aquatica': '9e2867f8-68eb-454f-b367-0ed0fd72d72a'
        };

        let activeParkKey = 'mk';
        let globalRideCache = {};

        function switchPark(parkKey) {
            activeParkKey = parkKey;

            if (globalRideCache[parkKey]) {
                displayRides(globalRideCache[parkKey]);
            } else {
                document.getElementById('rideDisplayList').innerHTML = '<div class="loading">Loading live times...</div>';
            }
        }

        async function fetchWaitTimes() {
            for (const [localId, wikiId] of Object.entries(parkIds)) {
                try {
                    const response = await fetch(`https://api.themeparks.wiki/v1/entity/${wikiId}/live`);
                    if (!response.ok) throw new Error('API server unreachable');
                    
                    const data = await response.json();
                    const rides = data.liveData.filter(item => item.entityType === "ATTRACTION");
                    
                    // Sorting logic: Longest wait time down to 0, followed by Closed at the bottom
                    rides.sort((a, b) => {
                        const aOpen = a.status === "OPERATING";
                        const bOpen = b.status === "OPERATING";
                        
                        if (aOpen && !bOpen) return -1;
                        if (!aOpen && bOpen) return 1;
                        
                        if (aOpen && bOpen) {
                            const aWait = a.queue?.STANDBY?.waitTime ?? 0;
                            const bWait = b.queue?.STANDBY?.waitTime ?? 0;
                            if (bWait !== aWait) {
                                return bWait - aWait;
                            }
                        }
                        
                        return a.name.localeCompare(b.name);
                    });

                    globalRideCache[localId] = rides;

                    if (localId === activeParkKey) {
                        displayRides(rides);
                    }
                } catch (error) {
                    console.error(`Error pulling times for ${localId}:`, error);
                    if (localId === activeParkKey && !globalRideCache[localId]) {
                        document.getElementById('rideDisplayList').innerHTML = '<div class="loading">Offline or waiting for data update...</div>';
                    }
                }
            }
        }

        function displayRides(rides) {
            const listContainer = document.getElementById('rideDisplayList');
            listContainer.innerHTML = ''; 

            if (!rides || rides.length === 0) {
                listContainer.innerHTML = '<div class="loading">No active attraction times reported.</div>';
                return;
            }

            rides.forEach(ride => {
                const isOpen = ride.status === "OPERATING";
                const wait = ride.queue?.STANDBY?.waitTime ?? 0;
                
                let dotColor = 'dot-green';
                let pulseClass = '';
                let textColor = 'green';
                
                if (!isOpen) {
                    dotColor = 'dot-gray';
                    textColor = 'gray';
                } else if (wait >= 31) {
                    dotColor = 'dot-red';
                    textColor = 'red';
                    // Apply fast pulsing ONLY if wait time is 45 minutes or greater
                    if (wait >= 45) {
                        pulseClass = 'pulse-red';
                    }
                } else if (wait >= 16) {
                    dotColor = 'dot-yellow';
                    textColor = 'yellow';
                }

                const displayWait = isOpen ? `${wait}m` : 'Closed';

                const row = document.createElement('div');
                row.className = 'ride-row';
                row.innerHTML = `
                    <span class="ride-name">${ride.name}</span>
                    <span class="wait-time ${textColor}">
                        <span class="status-dot ${dotColor} ${pulseClass}"></span>
                        ${displayWait}
                    </span>
                `;
                listContainer.appendChild(row);
            });
        }

        // Run network instantly on startup
        fetchWaitTimes();
        
        // Background sync loop running every 60 seconds
        setInterval(fetchWaitTimes, 60000);
    </script>
</body>
</html>
