<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Theme Park Wait Times</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #111111;
            --text-color: #ffffff;
            --border-radius: 16px;
            --green: #00ff88;
            --yellow: #ffcc00;
            --red: #ff4444;
            --primary: #3aa6ff;
            --glow-color: rgba(58, 166, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 16px;
            line-height: 1.5;
            padding-top: 90px; 
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #121212;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            z-index: 1000;
            border-bottom: 1px solid #222;
            padding: 14px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .select-container {
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        select {
            width: 100%;
            padding: 12px 40px 12px 16px;
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-color);
            background-color: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            cursor: pointer;
            appearance: none; 
            -webkit-appearance: none;
            text-transform: uppercase;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(58, 166, 255, 0.3);
        }

        .select-container::after {
            content: "▼";
            font-size: 0.8rem;
            color: #666;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .park-container {
            background: var(--card-bg);
            border: 2px solid #222;
            border-radius: var(--border-radius);
            padding: 24px;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 25px var(--glow-color);
        }

        .sync-timestamp-bar {
            text-align: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
            margin-bottom: 20px;
        }

        .park-stats-dashboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
            background: #161616;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 12px;
            text-align: center;
            gap: 16px;
        }

        .stat-box.full-width {
            flex: 0 0 100%;
            border-bottom: 1px solid #222;
            padding-bottom: 12px;
        }

        .stat-box.split-width {
            flex: 1;
            min-width: 40%;
        }

        .stat-box .stat-label {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .stat-box .stat-value {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            white-space: nowrap;
        }

        .stat-box .stat-value.avg-wait-highlight {
            color: var(--primary);
        }
        
        .stat-box .stat-value.weather-highlight {
            color: var(--yellow);
        }

                padding-top: 85px;
