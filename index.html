<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Theme Park Wait Times</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #111111;
            --text-color: #ffffff;
            --border-radius: 16px;
            --green: #00ff88;
            --yellow: #ffcc00;
            --red: #ff4444;
            --primary: #3aa6ff;
            --glow-color: rgba(58, 166, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 16px;
            line-height: 1.5;
            padding-top: 90px; 
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #121212;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            z-index: 1000;
            border-bottom: 1px solid #222;
            padding: 14px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .select-container {
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        select {
            width: 100%;
            padding: 12px 40px 12px 16px;
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-color);
            background-color: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            cursor: pointer;
            appearance: none; 
            -webkit-appearance: none;
            text-transform: uppercase;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(58, 166, 255, 0.3);
        }

        .select-container::after {
            content: "▼";
            font-size: 0.8rem;
            color: #666;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .park-container {
            background: var(--card-bg);
            border: 2px solid #222;
            border-radius: var(--border-radius);
            padding: 24px;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 25px var(--glow-color);
        }

        /* --- CENTERED PARK TITLE --- */
        .park-title-header {
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 4px;
            text-align: center;
        }

        .park-divider {
            height: 1px;
            background: #2a2a2a;
            margin-bottom: 16px;
            width: 100%;
        }

        .sync-timestamp-bar {
            text-align: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .park-stats-dashboard {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #161616;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 20px;
            text-align: center;
            gap: 16px;
        }

        .stat-box {
            flex: 1;
        }

        .stat-box .stat-label {
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .stat-box .stat-value {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            white-space: nowrap;
        }

        .stat-box .stat-value.avg-wait-highlight {
            color: var(--primary);
        }

        @media (max-width: 480px) {
            body {
                padding-top: 85px;
            }
            .park-stats-dashboard {
                flex-direction: column;
                gap: 12px;
            }
            .stat-box:first-child {
                border-bottom: 1px solid #222;
                padding-bottom: 10px;
                width: 100%;
            }
            .stat-box .stat-value {
                font-size: 1.2rem;
            }
        }

        .ride-list {
            display: flex;
            flex-direction: column;
        }

        .ride-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 1.05rem;
            font-weight: 700;
        }

        .ride-row:last-child {
            border-bottom: none;
        }

        .ride-meta-container {
            display: flex;
            flex-direction: column;
            padding-right: 15px;
        }

        .ride-name {
            color: #ddd;
        }

        .park-badge {
            font-size: 0.65rem;
            font-weight: 800;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-top: 2px;
        }

        .wait-time {
            display: flex;
            align-items: center;
            white-space: nowrap;
            font-weight: 800;
        }

        .green { color: var(--green); }
        .yellow { color: var(--yellow); }
        .red { color: var(--red); }
        .gray { color: #666; }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 12px;
            display: inline-block;
        }

        .dot-green { background-color: var(--green); }
        .dot-yellow { background-color: var(--yellow); }
        .dot-red { background-color: var(--red); }
        .dot-gray { background-color: #444; }
        
        .pulse-red {
            animation: pulse-danger 0.9s infinite ease-in-out;
            box-shadow: 0 0 12px var(--red);
        }

        @keyframes pulse-danger {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
            font-weight: bold;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="select-container">
            <select id="parkSelect" onchange="switchPark(this.value)">
                <optgroup label="Disney">
                    <option value="mk" selected>Magic Kingdom</option>
                    <option value="epcot">EPCOT</option>
                    <option value="hs">Hollywood Studios</option>
                    <option value="ak">Animal Kingdom</option>
                </optgroup>
                <optgroup label="Universal">
                    <option value="usf">Universal Studios Florida</option>
                    <option value="ioa">Islands of Adventure</option>
                    <option value="epic">Epic Universe</option>
                </optgroup>
                <optgroup label="Aggregated Monitors">
                    <option value="all">All Parks (Orlando)</option>
                </optgroup>
            </select>
        </div>
    </header>

    <div class="park-container">
        <div id="dynamicParkTitle" class="park-title-header">Magic Kingdom</div>
        <div class="park-divider"></div>

        <div id="syncTimeStatus" class="sync-timestamp-bar">Connecting to stream...</div>

        <div class="park-stats-dashboard">
            <div class="stat-box">
                <div class="stat-label">Today's Hours</div>
                <div id="parkHoursValue" class="stat-value">Fetching...</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Avg. Wait Time</div>
                <div id="parkAvgWaitValue" class="stat-value avg-wait-highlight">--</div>
            </div>
        </div>

        <div id="rideDisplayList" class="ride-list">
            <div class="loading">Loading live times...</div>
        </div>
    </div>

    <script>
        const API_BASE = "https://api.themeparks.wiki/v1";

        const parkIds = {
            'mk': '75ea578a-adc8-4116-a54d-dccb60765ef9',    
            'epcot': '47f90d2c-e191-4239-a466-5892ef59a88b', 
            'hs': '288747d1-8b4f-4a64-867e-ea7c9b27bad8',    
            'ak': '1c84a229-8862-4648-9c71-378ddd2c7693',     
            'usf': 'eb3f4560-2383-4a36-9152-6b3e5ed6bc57',   
            'ioa': '267615cc-8943-4c2a-ae2c-5da728ca591f',   
            'epic': '12dbb85b-265f-44e6-bccf-f1faa17211fc'
        };

        const parkCleanNames = {
            'mk': 'Magic Kingdom',
            'epcot': 'EPCOT',
            'hs': 'Hollywood Studios',
            'ak': 'Animal Kingdom',
            'usf': 'Universal Studios',
            'ioa': 'Islands of Adventure',
            'epic': 'Epic Universe'
        };

        let activeParkKey = 'mk';
        let globalRideCache = {};
        let globalHoursCache = {};
        let lastFetchTimestamp = null;

        function switchPark(parkKey) {
            activeParkKey = parkKey;
            
            const selector = document.getElementById('parkSelect');
            if (selector && selector.options[selector.selectedIndex]) {
                document.getElementById('dynamicParkTitle').innerText = selector.options[selector.selectedIndex].text;
            }

            updateDashboardDisplay(parkKey);
            
            if (parkKey === 'all') {
                displayAllParksCombined();
            } else if (globalRideCache[parkKey]) {
                displayRides(globalRideCache[parkKey]);
            } else {
                document.getElementById('rideDisplayList').innerHTML = '<div class="loading">Loading live times...</div>';
                fetchWaitTimes();
            }
        }

        function formatTimeString(isoString) {
            if (!isoString) return '';
            try {
                const date = new Date(isoString);
                return date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            } catch (e) {
                return '';
            }
        }

        function updateDashboardDisplay(parkKey) {
            const hoursEl = document.getElementById('parkHoursValue');
            const avgWaitEl = document.getElementById('parkAvgWaitValue');
            if (!hoursEl || !avgWaitEl) return;

            if (parkKey === 'all') {
                hoursEl.innerText = "Multiple Schedules";
                let totalWait = 0;
                let totalRidesCount = 0;
                Object.values(globalRideCache).forEach(ridesList => {
                    let operating = ridesList.filter(r => r.status === "OPERATING" && r.queue?.STANDBY?.waitTime !== undefined);
                    operating.forEach(r => {
                        totalWait += r.queue.STANDBY.waitTime;
                        totalRidesCount++;
                    });
                });

                if (totalRidesCount > 0) {
                    avgWaitEl.innerText = `${Math.round(totalWait / totalRidesCount)} min`;
                } else {
                    avgWaitEl.innerText = "--";
                }
                return;
            }

            if (globalHoursCache[parkKey]) {
                hoursEl.innerText = globalHoursCache[parkKey];
            } else {
                hoursEl.innerText = "Fetching...";
                fetchParkHours(parkKey);
            }

            const rides = globalRideCache[parkKey];
            if (rides && rides.length > 0) {
                let operatingRides = rides.filter(r => r.status === "OPERATING" && r.queue?.STANDBY?.waitTime !== undefined);
                if (operatingRides.length > 0) {
                    let totalWait = operatingRides.reduce((sum, r) => sum + r.queue.STANDBY.waitTime, 0);
                    let avg = Math.round(totalWait / operatingRides.length);
                    avgWaitEl.innerText = `${avg} min`;
                } else {
                    avgWaitEl.innerText = "Closed";
                }
            } else {
                avgWaitEl.innerText = "--";
            }
        }

        function runLiveClockTracker() {
            setInterval(() => {
                const statusEl = document.getElementById('syncTimeStatus');
                if (!statusEl) return;
                if (!lastFetchTimestamp) {
                    statusEl.innerText = "Waiting for initial sync...";
                    return;
                }
                const elapsedSeconds = Math.floor((Date.now() - lastFetchTimestamp) / 1000);
                if (elapsedSeconds < 5) {
                    statusEl.innerText = "Updated just now";
                } else {
                    statusEl.innerText = `Updated ${elapsedSeconds}s ago`;
                }
            }, 1000);
        }

        async function fetchParkHours(parkKey) {
            if (parkKey === 'all') return;
            const wikiId = parkIds[parkKey];
            try {
                const response = await fetch(`${API_BASE}/entity/${wikiId}/schedule`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                if (data && data.schedule && data.schedule.length > 0) {
                    const localDate = new Date();
                    const yyyy = localDate.getFullYear();
                    const mm = String(localDate.getMonth() + 1).padStart(2, '0');
                    const dd = String(localDate.getDate()).padStart(2, '0');
                    const todayStr = `${yyyy}-${mm}-${dd}`;
                    
                    let operationalDays = data.schedule.filter(day => day.date === todayStr && day.type === "OPERATING");
                    if (operationalDays.length === 0) {
                        operationalDays = data.schedule.filter(day => day.type === "OPERATING");
                    }
                    
                    if (operationalDays.length > 0 && operationalDays[0].openingTime) {
                        const target = operationalDays[0];
                        let hoursText = `${formatTimeString(target.openingTime)} - ${formatTimeString(target.closingTime)}`;
                        globalHoursCache[parkKey] = hoursText;
                    } else {
                        globalHoursCache[parkKey] = "Closed / See App";
                    }
                } else {
                    globalHoursCache[parkKey] = "Closed";
                }
                
                if (parkKey === activeParkKey) {
                    const hoursEl = document.getElementById('parkHoursValue');
                    if (hoursEl) hoursEl.innerText = globalHoursCache[parkKey];
                }
            } catch (e) {
                const hoursEl = document.getElementById('parkHoursValue');
                if (parkKey === activeParkKey && hoursEl) hoursEl.innerText = "Unavailable";
            }
        }

        async function fetchSingleParkTimes(localId, wikiId) {
            try {
                const response = await fetch(`${API_BASE}/entity/${wikiId}/live`);
                if (!response.ok) throw new Error('API server error');
                
                const data = await response.json();
                if (!data || !data.liveData) return;
                
                const rides = data.liveData.filter(item => item.entityType === "ATTRACTION");
                
                rides.sort((a, b) => {
                    const aOpen = a.status === "OPERATING";
                    const bOpen = b.status === "OPERATING";
                    
                    if (aOpen && !bOpen) return -1;
                    if (!aOpen && bOpen) return 1;
                    
                    if (aOpen && bOpen) {
                        const aWait = a.queue?.STANDBY?.waitTime ?? 0;
                        const bWait = b.queue?.STANDBY?.waitTime ?? 0;
                        if (bWait !== aWait) return bWait - aWait;
                    }
                    return a.name.localeCompare(b.name);
                });

                globalRideCache[localId] = rides;

                if (localId === activeParkKey) {
                    updateDashboardDisplay(localId);
                    displayRides(rides);
                } else if (activeParkKey === 'all') {
                    updateDashboardDisplay('all');
                    displayAllParksCombined();
                }
            } catch (error) {
                console.error(`Error pulling times for ${localId}:`, error);
            }
        }

        async function fetchWaitTimes() {
            if (activeParkKey !== 'all' && !globalHoursCache[activeParkKey]) {
                fetchParkHours(activeParkKey);
            }

            const fetchPromises = Object.entries(parkIds).map(([localId, wikiId]) => 
                fetchSingleParkTimes(localId, wikiId)
            );

            await Promise.allSettled(fetchPromises);
            lastFetchTimestamp = Date.now();
        }

        function displayRides(rides) {
            const listContainer = document.getElementById('rideDisplayList');
            if (!listContainer) return;
            listContainer.innerHTML = ''; 

            if (!rides || rides.length === 0) {
                listContainer.innerHTML = '<div class="loading">No active attraction times reported.</div>';
                return;
            }

            rides.forEach(ride => {
                const isOpen = ride.status === "OPERATING";
                const wait = ride.queue?.STANDBY?.waitTime ?? 0;
                
                let dotColor = 'dot-green';
                let pulseClass = '';
                let textColor = 'green';
                
                if (!isOpen) {
                    dotColor = 'dot-gray';
                    textColor = 'gray';
                } else if (wait >= 31) {
                    dotColor = 'dot-red';
                    textColor = 'red';
                    if (wait >= 45) {
                        pulseClass = 'pulse-red';
                    }
                } else if (wait >= 16) {
                    dotColor = 'dot-yellow';
                    textColor = 'yellow';
                }

                const displayWait = isOpen ? `${wait}m` : 'Closed';

                const row = document.createElement('div');
                row.className = 'ride-row';
                row.innerHTML = `
                    <div class="ride-meta-container">
                        <span class="ride-name">${ride.name}</span>
                    </div>
                    <span class="wait-time ${textColor}">
                        <span class="status-dot ${dotColor} ${pulseClass}"></span>
                        ${displayWait}
                    </span>
                `;
                listContainer.appendChild(row);
            });
        }

        function displayAllParksCombined() {
            const listContainer = document.getElementById('rideDisplayList');
            if (!listContainer) return;
            listContainer.innerHTML = '';

            let combinedRides = [];

            Object.entries(globalRideCache).forEach(([parkKey, ridesList]) => {
                ridesList.forEach(ride => {
                    combinedRides.push({
                        ...ride,
                        originParkName: parkCleanNames[parkKey] || 'Theme Park'
                    });
                });
            });

            if (combinedRides.length === 0) {
                listContainer.innerHTML = '<div class="loading">Gathering cross-network attraction feeds...</div>';
                return;
            }

            combinedRides.sort((a, b) => {
                const aOpen = a.status === "OPERATING";
                const bOpen = b.status === "OPERATING";
                
                if (aOpen && !bOpen) return -1;
                if (!aOpen && bOpen) return 1;
                
                if (aOpen && bOpen) {
                    const aWait = a.queue?.STANDBY?.waitTime ?? 0;
                    const bWait = b.queue?.STANDBY?.waitTime ?? 0;
                    if (bWait !== aWait) return bWait - aWait;
                }
                return a.name.localeCompare(b.name);
            });

            combinedRides.forEach(ride => {
                const isOpen = ride.status === "OPERATING";
                const wait = ride.queue?.STANDBY?.waitTime ?? 0;
                
                let dotColor = 'dot-green';
                let pulseClass = '';
                let textColor = 'green';
                
                if (!isOpen) {
                    dotColor = 'dot-gray';
                    textColor = 'gray';
                } else if (wait >= 31) {
                    dotColor = 'dot-red';
                    textColor = 'red';
                    if (wait >= 45) {
                        pulseClass = 'pulse-red';
                    }
                } else if (wait >= 16) {
                    dotColor = 'dot-yellow';
                    textColor = 'yellow';
                }

                const displayWait = isOpen ? `${wait}m` : 'Closed';

                const row = document.createElement('div');
                row.className = 'ride-row';
                row.innerHTML = `
                    <div class="ride-meta-container">
                        <span class="ride-name">${ride.name}</span>
                        <span class="park-badge">${ride.originParkName}</span>
                    </div>
                    <span class="wait-time ${textColor}">
                        <span class="status-dot ${dotColor} ${pulseClass}"></span>
                        ${displayWait}
                    </span>
                `;
                listContainer.appendChild(row);
            });
        }

        function scheduleNextMinuteSync() {
            const now = new Date();
            const delayUntilNextMinute = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
            
            setTimeout(() => {
                fetchWaitTimes();
                setInterval(fetchWaitTimes, 60000);
            }, delayUntilNextMinute);
        }

        window.addEventListener('DOMContentLoaded', () => {
            fetchWaitTimes();
            scheduleNextMinuteSync();
            runLiveClockTracker();
        });
    </script>
</body>
</html>
